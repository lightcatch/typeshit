name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build & Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "typeshit ${{ github.ref_name }}"
          releaseBody: |
            轻量化的 txt / markdown 文本编辑器。基于 Tauri 2 + Svelte 5 + CodeMirror 6 构建，
            体积约 12 MB，启动快、内存占用低。

            ## 下载

            - **Windows (x64)** — `typeshit_*_x64-setup.exe`
            - **macOS (Apple Silicon)** — `typeshit_*_aarch64.dmg`
            - **macOS (Intel)** — `typeshit_*_x64.dmg`
            - **Linux** — `typeshit_*_amd64.AppImage` 或 `typeshit_*_amd64.deb`

            ## 主要特性

            - 支持 `.txt` / `.md`，Markdown 实时预览（编辑 / 预览 / 分屏）
            - 14 种语言代码块语法高亮
            - 浅色 / 深色主题，自动记忆
            - 多标签页 + 滚动同步
            - 单实例：再次「打开方式」会作为新标签加入已有窗口
            - 自定义无边框窗口，简洁现代

            ## 快捷键

            `Ctrl + N / O / S / Shift+S` 新建 / 打开 / 保存 / 另存
            `Ctrl + W / Tab` 关闭标签 / 切换标签
            `Ctrl + / / T / F` 切换视图 / 切换主题 / 查找
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
